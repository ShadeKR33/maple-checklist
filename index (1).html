<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>메이플 주간 체크리스트</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><ellipse cx='16' cy='21' rx='6.5' ry='3.5' fill='%23D85A30' opacity='0.2'/><rect x='12.5' y='16' width='7' height='8' rx='2.5' fill='%23f5e6c8'/><rect x='14' y='17.5' width='1.3' height='5' rx='0.65' fill='%23d4c09a'/><rect x='16.2' y='17.5' width='1.3' height='5' rx='0.65' fill='%23d4c09a'/><path d='M8 17C8 11.477 11.582 8 16 8C20.418 8 24 11.477 24 17H8Z' fill='%23D85A30'/><ellipse cx='11.5' cy='12.5' rx='1.4' ry='0.9' fill='white' opacity='0.7'/><ellipse cx='16' cy='9.8' rx='1.2' ry='0.8' fill='white' opacity='0.6'/><ellipse cx='20' cy='12.5' rx='1.1' ry='0.75' fill='white' opacity='0.55'/></svg>">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f9f9f7;
      --surface: #ffffff;
      --surface2: #f2f1ee;
      --border: rgba(0,0,0,0.1);
      --border2: rgba(0,0,0,0.18);
      --text: #1a1a18;
      --text2: #6b6b67;
      --text3: #a0a09c;
      --green: #1D9E75;
      --green-light: #E1F5EE;
      --green-dark: #0F6E56;
      --red-light: #FAECE7;
      --red-dark: #993C1D;
      --blue-light: #E6F1FB;
      --blue-dark: #185FA5;
      --hunt-light: #EAF3DE;
      --hunt-dark: #3B6D11;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a18;
        --surface: #242422;
        --surface2: #2e2e2b;
        --border: rgba(255,255,255,0.1);
        --border2: rgba(255,255,255,0.18);
        --text: #f0efe8;
        --text2: #9b9b95;
        --text3: #636360;
        --green-light: #04342C;
        --green-dark: #9FE1CB;
        --red-light: #4A1B0C;
        --red-dark: #F5C4B3;
        --blue-light: #042C53;
        --blue-dark: #B5D4F4;
        --hunt-light: #173404;
        --hunt-dark: #C0DD97;
      }
    }

    body {
      font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 0 0 4rem;
    }

    .top-bar {
      background: var(--surface);
      border-bottom: 0.5px solid var(--border);
      padding: 1.25rem 1.5rem;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .top-bar-inner {
      max-width: 480px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .app-title {
      font-size: 16px;
      font-weight: 500;
      color: var(--text);
    }

    .app-title span {
      font-size: 13px;
      color: var(--text3);
      font-weight: 400;
      margin-left: 8px;
    }

    .reset-btn {
      font-size: 13px;
      color: var(--text2);
      background: none;
      border: 0.5px solid var(--border2);
      border-radius: 8px;
      padding: 6px 14px;
      cursor: pointer;
      transition: background 0.15s;
    }

    .reset-btn:hover { background: var(--surface2); }

    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 1.25rem 1.25rem 0;
    }

    .week-label {
      font-size: 13px;
      color: var(--text3);
      margin-bottom: 1rem;
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 1rem;
    }

    .stat-card {
      background: var(--surface2);
      border-radius: 10px;
      padding: 12px;
    }

    .stat-label {
      font-size: 11px;
      color: var(--text3);
      margin-bottom: 4px;
    }

    .stat-value {
      font-size: 18px;
      font-weight: 500;
      color: var(--text);
    }

    .stat-sub {
      font-size: 10px;
      color: var(--text3);
      margin-top: 2px;
    }

    .progress-wrap {
      background: var(--surface2);
      border-radius: 99px;
      height: 5px;
      margin-bottom: 1.5rem;
      overflow: hidden;
    }

    .progress-bar {
      height: 5px;
      border-radius: 99px;
      background: var(--green);
      transition: width 0.4s ease;
    }

    .day-section {
      background: var(--surface);
      border-radius: 14px;
      border: 0.5px solid var(--border);
      margin-bottom: 10px;
      overflow: hidden;
    }

    .day-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 0.5px solid var(--border);
      background: var(--surface);
    }

    .day-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .day-name {
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
    }

    .day-badge {
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 99px;
    }

    .badge-active {
      background: var(--green-light);
      color: var(--green-dark);
    }

    .badge-easy {
      background: var(--surface2);
      color: var(--text3);
    }

    .day-time {
      font-size: 12px;
      color: var(--text3);
    }

    .task-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 16px;
      border-bottom: 0.5px solid var(--border);
      cursor: pointer;
      transition: background 0.12s;
      -webkit-tap-highlight-color: transparent;
    }

    .task-row:last-child { border-bottom: none; }
    .task-row:active { background: var(--surface2); }

    .checkbox {
      width: 22px;
      height: 22px;
      border-radius: 7px;
      border: 1.5px solid var(--border2);
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.18s;
    }

    .checkbox.checked {
      background: var(--green);
      border-color: var(--green);
    }

    .chk { display: none; }
    .checkbox.checked .chk { display: block; }

    .task-info { flex: 1; min-width: 0; }

    .task-name {
      font-size: 14px;
      color: var(--text);
      transition: color 0.18s;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .task-name.done {
      color: var(--text3);
      text-decoration: line-through;
    }

    .task-meta {
      font-size: 12px;
      color: var(--text3);
      margin-top: 3px;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .tag {
      font-size: 11px;
      padding: 1px 7px;
      border-radius: 99px;
    }

    .tag-boss { background: var(--red-light); color: var(--red-dark); }
    .tag-hunt { background: var(--hunt-light); color: var(--hunt-dark); }
    .tag-other { background: var(--blue-light); color: var(--blue-dark); }

    .task-meso {
      font-size: 13px;
      font-weight: 500;
      color: var(--text2);
      white-space: nowrap;
      transition: color 0.18s;
    }

    .task-meso.done { color: var(--text3); }
  </style>
</head>
<body>

<div class="top-bar">
  <div class="top-bar-inner">
    <div class="app-title" style="display:flex;align-items:center;gap:8px;">
      <svg width="28" height="28" viewBox="0 0 28 28" fill="none" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="14" cy="18.5" rx="6" ry="3.5" fill="#D85A30" opacity="0.18"/>
        <rect x="11" y="14" width="6" height="7" rx="2" fill="#f5e6c8"/>
        <rect x="12.5" y="15.5" width="1.2" height="4" rx="0.6" fill="#d4c09a"/>
        <rect x="14.3" y="15.5" width="1.2" height="4" rx="0.6" fill="#d4c09a"/>
        <path d="M7 15C7 10.029 10.134 7 14 7C17.866 7 21 10.029 21 15H7Z" fill="#D85A30"/>
        <ellipse cx="10" cy="11" rx="1.2" ry="0.8" fill="white" opacity="0.7"/>
        <ellipse cx="14.5" cy="9" rx="1" ry="0.7" fill="white" opacity="0.6"/>
        <ellipse cx="17.5" cy="11.5" rx="0.9" ry="0.6" fill="white" opacity="0.5"/>
      </svg>
      메이플 체크리스트 <span id="week-label"></span>
    </div>
    <button class="reset-btn" onclick="resetAll()">다음 주 초기화</button>
  </div>
</div>

<div class="container">
  <div style="height: 1rem;"></div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">완료</div>
      <div class="stat-value" id="done-count">0/10</div>
      <div class="stat-sub">항목</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">획득 메소</div>
      <div class="stat-value" id="earned-meso">0억</div>
      <div class="stat-sub">/ 42억 5천만</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">남은 시간</div>
      <div class="stat-value" id="remain-time">13h</div>
      <div class="stat-sub">/ 13시간</div>
    </div>
  </div>

  <div class="progress-wrap">
    <div class="progress-bar" id="progress-bar" style="width:0%"></div>
  </div>

  <div id="task-list"></div>
</div>

<script>
const DAYS = [
  {
    day: "목요일", time: "3시간", type: "active",
    tasks: [
      { id: "thu1", name: "보스돌이 안셰인", tag: "boss", meta: "2시간", meso: 1650000000 },
      { id: "thu2", name: "사냥", tag: "hunt", meta: "1시간", meso: 120000000 }
    ]
  },
  {
    day: "금요일", time: "3시간", type: "active",
    tasks: [
      { id: "fri1", name: "보스돌이 엘나영", tag: "boss", meta: "2시간", meso: 1200000000 },
      { id: "fri2", name: "사냥", tag: "hunt", meta: "1시간", meso: 120000000 }
    ]
  },
  {
    day: "토요일", time: "2시간 30분", type: "active",
    tasks: [
      { id: "sat1", name: "보스돌이 진호참", tag: "boss", meta: "1시간", meso: 400000000 },
      { id: "sat2", name: "엥글러 컴퍼니 1회차", tag: "other", meta: "30분", meso: 80000000 },
      { id: "sat3", name: "사냥", tag: "hunt", meta: "1시간", meso: 120000000 }
    ]
  },
  {
    day: "일요일", time: "1시간 30분", type: "active",
    tasks: [
      { id: "sun1", name: "엥글러 컴퍼니 2회차", tag: "other", meta: "30분", meso: 80000000 },
      { id: "sun2", name: "사냥", tag: "hunt", meta: "1시간", meso: 120000000 }
    ]
  },
  {
    day: "월요일", time: "1시간", type: "easy",
    tasks: [
      { id: "mon1", name: "사냥", tag: "hunt", meta: "1시간", meso: 120000000 }
    ]
  },
  {
    day: "화요일", time: "1시간", type: "easy",
    tasks: [
      { id: "tue1", name: "사냥", tag: "hunt", meta: "1시간", meso: 120000000 }
    ]
  },
  {
    day: "수요일", time: "1시간", type: "easy",
    tasks: [
      { id: "wed1", name: "사냥", tag: "hunt", meta: "1시간", meso: 120000000 }
    ]
  }
];

const STORAGE_KEY = "maple_checklist_v2";

function getWeekKey() {
  const now = new Date();
  const day = now.getDay();
  const diff = day < 4 ? day + 3 : day - 4;
  const thu = new Date(now);
  thu.setDate(now.getDate() - diff);
  return thu.toISOString().slice(0, 10);
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return {};
    const data = JSON.parse(raw);
    if (data.weekKey !== getWeekKey()) return {};
    return data.checks || {};
  } catch(e) { return {}; }
}

function saveState(c) {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({ weekKey: getWeekKey(), checks: c }));
  } catch(e) {}
}

let checks = loadState();

function formatMeso(n) {
  if (n >= 100000000) {
    const eok = Math.floor(n / 100000000);
    const rem = n % 100000000;
    if (rem === 0) return eok + "억";
    const chun = Math.floor(rem / 10000000);
    return eok + "억 " + (chun * 1000).toLocaleString() + "만";
  }
  return Math.round(n / 10000).toLocaleString() + "만";
}

function getAllTasks() {
  return DAYS.flatMap(d => d.tasks);
}

function updateStats() {
  const all = getAllTasks();
  let done = 0, earnedMeso = 0, usedTime = 0;
  all.forEach(t => {
    if (checks[t.id]) {
      done++;
      earnedMeso += t.meso;
      usedTime += t.meta.includes("30분") ? 0.5 : parseInt(t.meta);
    }
  });
  document.getElementById("done-count").textContent = done + "/" + all.length;
  document.getElementById("earned-meso").textContent = formatMeso(earnedMeso);
  document.getElementById("remain-time").textContent = (13 - usedTime) + "h";
  document.getElementById("progress-bar").style.width = (done / all.length * 100).toFixed(1) + "%";
}

function toggle(id) {
  checks[id] = !checks[id];
  saveState(checks);
  const row = document.querySelector('[data-id="' + id + '"]');
  row.querySelector('.checkbox').classList.toggle('checked', checks[id]);
  row.querySelector('.task-name').classList.toggle('done', checks[id]);
  row.querySelector('.task-meso').classList.toggle('done', checks[id]);
  updateStats();
}

function resetAll() {
  if (!confirm("다음 주 초기화할까요?")) return;
  checks = {};
  try { localStorage.removeItem(STORAGE_KEY); } catch(e) {}
  document.querySelectorAll('.checkbox').forEach(el => el.classList.remove('checked'));
  document.querySelectorAll('.task-name').forEach(el => el.classList.remove('done'));
  document.querySelectorAll('.task-meso').forEach(el => el.classList.remove('done'));
  updateStats();
}

function render() {
  const list = document.getElementById("task-list");
  let html = "";
  DAYS.forEach(d => {
    const badgeClass = d.type === "active" ? "badge-active" : "badge-easy";
    const badgeLabel = d.type === "active" ? "집중" : "여유";
    html += '<div class="day-section"><div class="day-header"><div class="day-left"><span class="day-name">' + d.day + '</span><span class="day-badge ' + badgeClass + '">' + badgeLabel + '</span></div><span class="day-time">' + d.time + '</span></div>';
    d.tasks.forEach(t => {
      const tagClass = "tag-" + t.tag;
      const tagLabel = t.tag === "boss" ? "보스" : t.tag === "hunt" ? "사냥" : "콘텐츠";
      const chk = checks[t.id];
      html += '<div class="task-row" data-id="' + t.id + '" onclick="toggle(\'' + t.id + '\')">' +
        '<div class="checkbox' + (chk ? ' checked' : '') + '"><svg class="chk" width="13" height="13" viewBox="0 0 13 13" fill="none"><polyline points="2,6.5 5.5,10 11,3" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg></div>' +
        '<div class="task-info"><div class="task-name' + (chk ? ' done' : '') + '">' + t.name + '</div>' +
        '<div class="task-meta"><span class="tag ' + tagClass + '">' + tagLabel + '</span>' + t.meta + '</div></div>' +
        '<div class="task-meso' + (chk ? ' done' : '') + '">' + formatMeso(t.meso) + '</div></div>';
    });
    html += '</div>';
  });
  list.innerHTML = html;

  const thu = new Date(getWeekKey());
  const wed = new Date(thu);
  wed.setDate(thu.getDate() + 6);
  document.getElementById("week-label").textContent =
    (thu.getMonth()+1) + "/" + thu.getDate() + " ~ " + (wed.getMonth()+1) + "/" + wed.getDate();

  updateStats();
}

render();
</script>
</body>
</html>
